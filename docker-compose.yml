services:
  postgres:
    image: postgres:16-alpine
    container_name: corretor-ia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corretor_ia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corretor_ia_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-corretor_ia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - corretor-ia-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-corretor_ia} -d $${POSTGRES_DB:-corretor_ia}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  corretor-ia-postgres-data:
