name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22.x"
  DATABASE_URL: "postgresql://corretor_ia:corretor_ia_ci_only@localhost:5432/corretor_ia?schema=public"
  APP_URL: "http://localhost:3000"
  # Segredo só de CI (nunca usado fora deste pipeline) — Better Auth
  # (ADR-0002) exige AUTH_SECRET com pelo menos 32 caracteres.
  AUTH_SECRET: "ci-only-secret-never-used-in-production-3f7a9c2b"
  STORAGE_BUCKET_NAME: "corretor-ia-media"
  STORAGE_REGION: "us-east-1"
  STORAGE_ACCESS_KEY_ID: "corretor_ia"
  STORAGE_SECRET_ACCESS_KEY: "corretor_ia_ci_only"
  STORAGE_ENDPOINT: "http://localhost:9000"
  STORAGE_FORCE_PATH_STYLE: "true"
  STORAGE_PUBLIC_BASE_URL: "http://localhost:9000/corretor-ia-media"

jobs:
  quality:
    name: Formatação, lint, tipos, testes e build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: corretor_ia
          POSTGRES_PASSWORD: corretor_ia_ci_only
          POSTGRES_DB: corretor_ia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U corretor_ia -d corretor_ia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # O bloco "services:" do GitHub Actions não permite sobrescrever o
      # comando do container (equivalente ao "command:" do
      # docker-compose), necessário para o MinIO (`server /data
      # --console-address ":9001"`). Por isso ele sobe como um passo
      # manual, não como serviço — abordagem confirmada localmente antes
      # de ir para o pipeline.
      - name: Subir MinIO (compatível com S3 — ver ADR-0003)
        run: |
          docker run -d --name minio -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=${{ env.STORAGE_ACCESS_KEY_ID }} \
            -e MINIO_ROOT_PASSWORD=${{ env.STORAGE_SECRET_ACCESS_KEY }} \
            minio/minio server /data --console-address ":9001"

      - name: Aguardar MinIO ficar saudável
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO no ar."
              exit 0
            fi
            sleep 1
          done
          echo "MinIO não respondeu a tempo." >&2
          exit 1

      - name: Criar bucket do MinIO
        run: |
          docker run --rm --network host --entrypoint sh minio/mc -c "
            mc alias set ci http://localhost:9000 ${{ env.STORAGE_ACCESS_KEY_ID }} ${{ env.STORAGE_SECRET_ACCESS_KEY }} &&
            mc mb --ignore-existing ci/${{ env.STORAGE_BUCKET_NAME }} &&
            mc anonymous set download ci/${{ env.STORAGE_BUCKET_NAME }}
          "

      - name: Instalação determinística das dependências
        run: npm ci

      - name: Auditoria de dependências (nunca bloqueia em severidade moderada)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Gerar cliente Prisma
        run: npm run db:generate

      - name: Verificar formatação (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Verificação de tipos (TypeScript estrito)
        run: npm run typecheck

      - name: Aplicar migrações no banco de teste
        run: npm run db:migrate:deploy

      - name: Testes unitários e de integração (Vitest)
        run: npm run test:coverage

      - name: Build de produção
        run: npm run build

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Testes E2E e de acessibilidade (Playwright)
        run: npm run test:e2e

      - name: Publicar relatório de cobertura como evidência
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Publicar relatório do Playwright como evidência
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
