name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22.x"
  DATABASE_URL: "postgresql://corretor_ia:corretor_ia_ci_only@localhost:5432/corretor_ia?schema=public"
  APP_URL: "http://localhost:3000"

jobs:
  quality:
    name: Formatação, lint, tipos, testes e build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: corretor_ia
          POSTGRES_PASSWORD: corretor_ia_ci_only
          POSTGRES_DB: corretor_ia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U corretor_ia -d corretor_ia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Instalação determinística das dependências
        run: npm ci

      - name: Auditoria de dependências (nunca bloqueia em severidade moderada)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Gerar cliente Prisma
        run: npm run db:generate

      - name: Verificar formatação (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Verificação de tipos (TypeScript estrito)
        run: npm run typecheck

      - name: Aplicar migrações no banco de teste
        run: npm run db:migrate:deploy

      - name: Testes unitários e de integração (Vitest)
        run: npm run test:coverage

      - name: Build de produção
        run: npm run build

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Testes E2E e de acessibilidade (Playwright)
        run: npm run test:e2e

      - name: Publicar relatório de cobertura como evidência
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Publicar relatório do Playwright como evidência
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
